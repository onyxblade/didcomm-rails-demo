services:
  web:
    image: onyxblade/didcomm-rails-demo-web:latest
    ports:
      - "${HOST_PORT}:3000"
    env_file: .env
    environment:
      - DIDCOMM_SERVICE_URL=http://didcomm:3000
    volumes:
      - ./storage:/app/storage
    depends_on:
      - didcomm

  didcomm:
    image: onyxblade/didcomm-http:latest
